<svg viewBox="0 0 720 420" width="720" height="420" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <style>
    .lbl   { animation: kLabel   10s ease-in-out infinite; }
    .photo { animation: kPhoto   10s ease-in-out infinite; opacity: 0; }
    .zone  { animation: kZone    10s ease-in-out infinite; }
    .ext   { animation: kExtract 10s ease-in-out infinite; opacity: 0; }
    .pulse { animation: kPulse   1.2s ease-in-out infinite; }
    .prev  { animation: kPreview 10s ease-in-out infinite; }
    .sw    { transform-box: fill-box; transform-origin: center; }
    .sw1   { animation: kSw1 10s ease-in-out infinite; }
    .sw2   { animation: kSw2 10s ease-in-out infinite; }
    .sw3   { animation: kSw3 10s ease-in-out infinite; }
    .sw4   { animation: kSw4 10s ease-in-out infinite; }
    .sw5   { animation: kSw5 10s ease-in-out infinite; }
    .cur   { animation: kCursor 10s ease-in-out infinite; opacity: 0; }
    .rip   { animation: kRipple 10s ease-out infinite; transform-box: fill-box; transform-origin: center; opacity: 0; }
    .ring  { animation: kRing   10s ease-in-out infinite; opacity: 0; }
    .tip   { animation: kTip    10s ease-in-out infinite; opacity: 0; }

    @keyframes kLabel {
      0%, 10% { opacity: 1; } 14%, 93% { opacity: 0; } 98%, 100% { opacity: 1; }
    }
    @keyframes kPhoto {
      0%, 9%  { opacity: 0; transform: translate(360px, -90px) rotate(-6deg); }
      12%     { opacity: 1; }
      21%     { opacity: 1; transform: translate(360px, 148px) rotate(0deg); }
      24%     { opacity: 1; transform: translate(360px, 148px) scale(1); }
      28%, 100% { opacity: 0; transform: translate(360px, 148px) scale(0.85); }
    }
    @keyframes kZone {
      0%, 9%   { stroke: #b6bec9; }
      12%, 20% { stroke: #1c4d8f; }
      26%, 100% { stroke: #b6bec9; }
    }
    @keyframes kExtract {
      0%, 25% { opacity: 0; } 28%, 36% { opacity: 1; } 40%, 100% { opacity: 0; }
    }
    @keyframes kPulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.45; }
    }
    @keyframes kPreview {
      0%, 38% { opacity: 0; } 42%, 91% { opacity: 1; } 95%, 100% { opacity: 0; }
    }
    @keyframes kSw1 {
      0%, 43% { opacity: 0; transform: scale(0.4); }
      45%     { opacity: 1; transform: scale(1.12); }
      46.5%   { transform: scale(1); }
      91%     { opacity: 1; transform: scale(1); }
      95%, 100% { opacity: 0; transform: scale(1); }
    }
    @keyframes kSw2 {
      0%, 46% { opacity: 0; transform: scale(0.4); }
      48%     { opacity: 1; transform: scale(1.12); }
      49.5%   { transform: scale(1); }
      91%     { opacity: 1; transform: scale(1); }
      95%, 100% { opacity: 0; transform: scale(1); }
    }
    @keyframes kSw3 {
      0%, 49% { opacity: 0; transform: scale(0.4); }
      51%     { opacity: 1; transform: scale(1.12); }
      52.5%   { transform: scale(1); }
      91%     { opacity: 1; transform: scale(1); }
      95%, 100% { opacity: 0; transform: scale(1); }
    }
    @keyframes kSw4 {
      0%, 52% { opacity: 0; transform: scale(0.4); }
      54%     { opacity: 1; transform: scale(1.12); }
      55.5%   { transform: scale(1); }
      91%     { opacity: 1; transform: scale(1); }
      95%, 100% { opacity: 0; transform: scale(1); }
    }
    @keyframes kSw5 {
      0%, 55% { opacity: 0; transform: scale(0.4); }
      57%     { opacity: 1; transform: scale(1.12); }
      58.5%   { transform: scale(1); }
      91%     { opacity: 1; transform: scale(1); }
      95%, 100% { opacity: 0; transform: scale(1); }
    }
    @keyframes kCursor {
      0%, 56% { opacity: 0; transform: translate(680px, 420px); }
      60%     { opacity: 1; }
      64%     { opacity: 1; transform: translate(244px, 306px) scale(1); }
      65.5%   { opacity: 1; transform: translate(244px, 306px) scale(0.82); }
      67%     { opacity: 1; transform: translate(244px, 306px) scale(1); }
      76%     { opacity: 1; transform: translate(244px, 306px) scale(1); }
      82%, 100% { opacity: 0; transform: translate(680px, 420px); }
    }
    @keyframes kRipple {
      0%, 64% { opacity: 0; transform: scale(0.2); }
      66%     { opacity: 0.4; }
      73%, 100% { opacity: 0; transform: scale(2.8); }
    }
    @keyframes kRing {
      0%, 65% { opacity: 0; } 67%, 78% { opacity: 1; } 82%, 100% { opacity: 0; }
    }
    @keyframes kTip {
      0%, 66% { opacity: 0; transform: translateY(8px); }
      69%, 78% { opacity: 1; transform: translateY(0); }
      82%, 100% { opacity: 0; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .lbl, .photo, .zone, .ext, .pulse, .prev, .sw1, .sw2, .sw3, .sw4, .sw5, .cur, .rip, .ring, .tip {
        animation: none;
      }
    }
  </style>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c4d8f"/>
      <stop offset="100%" stop-color="#e8b04a"/>
    </linearGradient>
    <clipPath id="prevClip">
      <rect x="80" y="70" width="560" height="160" rx="10"/>
    </clipPath>
  </defs>

  <!-- component card -->
  <rect x="40" y="30" width="640" height="360" rx="16" fill="#ffffff" stroke="#d8dee4" stroke-width="1.5"/>

  <!-- dropzone -->
  <rect class="zone" x="70" y="60" width="580" height="180" rx="12" fill="none" stroke="#b6bec9" stroke-width="2" stroke-dasharray="8 7"/>

  <!-- empty-state label -->
  <g class="lbl">
    <text x="360" y="142" text-anchor="middle" font-size="18" fill="#57606a">Drag &amp; drop an image</text>
    <text x="360" y="168" text-anchor="middle" font-size="13" fill="#8b949e">(or click to browse)</text>
  </g>

  <!-- falling photo (mini landscape) -->
  <g class="photo">
    <g>
      <rect x="-84" y="-54" width="168" height="108" rx="10" fill="#ffffff" stroke="#d8dee4"/>
      <rect x="-76" y="-46" width="152" height="92" rx="6" fill="url(#sky)"/>
      <circle cx="34" cy="-14" r="12" fill="#e8b04a"/>
      <polygon points="-76,46 -22,-12 36,46" fill="#7a3b2e"/>
      <polygon points="2,46 44,0 76,46" fill="#2f2a26"/>
      <rect x="-76" y="34" width="152" height="12" fill="#cdd5d0" opacity="0.75"/>
    </g>
  </g>

  <!-- extracting state -->
  <g class="ext">
    <text class="pulse" x="360" y="156" text-anchor="middle" font-size="16" fill="#57606a">Extracting colors&#8230;</text>
  </g>

  <!-- preview (large landscape) -->
  <g class="prev">
    <g clip-path="url(#prevClip)">
      <rect x="80" y="70" width="560" height="160" fill="url(#sky)"/>
      <circle cx="530" cy="118" r="26" fill="#e8b04a"/>
      <polygon points="80,230 250,112 410,230" fill="#7a3b2e"/>
      <polygon points="320,230 470,138 640,230" fill="#2f2a26"/>
      <rect x="80" y="204" width="560" height="26" fill="#cdd5d0" opacity="0.75"/>
    </g>
    <rect x="80" y="70" width="560" height="160" rx="10" fill="none" stroke="#d8dee4"/>
  </g>

  <!-- swatches -->
  <g class="sw sw1">
    <rect x="70" y="270" width="92" height="56" rx="10" fill="#1c4d8f"/>
    <text x="116" y="352" text-anchor="middle" font-size="13" fill="#57606a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">#1c4d8f</text>
  </g>
  <g class="sw sw2">
    <rect x="192" y="270" width="92" height="56" rx="10" fill="#e8b04a"/>
    <text x="238" y="352" text-anchor="middle" font-size="13" fill="#57606a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">#e8b04a</text>
  </g>
  <g class="sw sw3">
    <rect x="314" y="270" width="92" height="56" rx="10" fill="#7a3b2e"/>
    <text x="360" y="352" text-anchor="middle" font-size="13" fill="#57606a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">#7a3b2e</text>
  </g>
  <g class="sw sw4">
    <rect x="436" y="270" width="92" height="56" rx="10" fill="#cdd5d0"/>
    <text x="482" y="352" text-anchor="middle" font-size="13" fill="#57606a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">#cdd5d0</text>
  </g>
  <g class="sw sw5">
    <rect x="558" y="270" width="92" height="56" rx="10" fill="#2f2a26"/>
    <text x="604" y="352" text-anchor="middle" font-size="13" fill="#57606a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">#2f2a26</text>
  </g>

  <!-- copied highlight ring on swatch 2 -->
  <rect class="ring" x="190" y="268" width="96" height="60" rx="11" fill="none" stroke="#1c4d8f" stroke-width="2.5"/>

  <!-- click ripple -->
  <circle class="rip" cx="238" cy="298" r="14" fill="#1c4d8f"/>

  <!-- copied tooltip -->
  <g class="tip">
    <rect x="160" y="226" width="156" height="30" rx="8" fill="#2f2a26"/>
    <polygon points="231,256 245,256 238,264" fill="#2f2a26"/>
    <text x="238" y="246" text-anchor="middle" font-size="13" fill="#ffffff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Copied #e8b04a</text>
  </g>

  <!-- cursor -->
  <g class="cur">
    <path d="M0 0 L0 17 L4.7 13.4 L7.3 19.3 L9.9 18.2 L7.3 12.4 L13 12.4 Z" fill="#111111" stroke="#ffffff" stroke-width="1.4"/>
  </g>
</svg>
